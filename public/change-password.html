<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password — See Before Buy</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #329580 0%, #245b62 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  p { font-size: 14px; color: #6B7280; margin-bottom: 24px; }
  label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 6px; }
  input { width: 100%; padding: 12px 14px; border: 1.5px solid #D1D5DB; border-radius: 8px; font-size: 15px; margin-bottom: 20px; }
  input:focus { outline: none; border-color: #329580; }
  .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #329580 0%, #245b62 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none; }
</style>
</head>
<body>
<div class="card">
  <h2>🔐 Set Your Password</h2>
  <p>This is your first login. Please set a new password to secure your account.</p>
  <div class="error" id="error-msg"></div>
  <form id="cp-form">
    <label>New Password</label>
    <input type="password" id="new-password" placeholder="Min 6 characters" required minlength="6">
    <label>Confirm Password</label>
    <input type="password" id="confirm-password" placeholder="Repeat new password" required>
    <button class="btn" type="submit" id="cp-btn">Set Password & Continue</button>
  </form>
</div>
<script>
const token = localStorage.getItem('sbb_token');
if (!token) window.location.href = '/';

document.getElementById('cp-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('error-msg');
  const btn = document.getElementById('cp-btn');
  const newPwd = document.getElementById('new-password').value;
  const confirm = document.getElementById('confirm-password').value;
  errEl.style.display = 'none';

  if (newPwd !== confirm) {
    errEl.textContent = 'Passwords do not match';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    const res = await fetch('/api/auth/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ new_password: newPwd }),
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error; errEl.style.display = 'block'; return; }
    window.location.href = '/dashboard.html';
  } catch {
    errEl.textContent = 'Connection error'; errEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Set Password & Continue';
  }
});
</script>
</body>
</html>
