<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment — See Before Buy AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #329580 0%, #245b62 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .card {
    background: white; border-radius: 16px; padding: 48px 40px;
    width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center;
  }
  .icon { font-size: 56px; margin-bottom: 16px; }
  h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  p { font-size: 15px; color: #6B7280; margin-bottom: 24px; line-height: 1.6; }
  .detail { background: #F0FDF4; border: 1px solid #A7F3D0; border-radius: 10px; padding: 16px; margin-bottom: 24px; font-size: 14px; color: #065F46; text-align: left; }
  .detail strong { display: block; margin-bottom: 4px; }
  .btn {
    display: inline-block; padding: 13px 32px;
    background: linear-gradient(135deg, #329580 0%, #245b62 100%);
    color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; text-decoration: none; transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.9; }
  .loading-text { color: #6B7280; font-size: 15px; }
  .error-box { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 10px; padding: 16px; margin-bottom: 24px; color: #DC2626; font-size: 14px; }
</style>
</head>
<body>
<div class="card">
  <!-- Verifying state -->
  <div id="verifying">
    <div class="icon">⏳</div>
    <h2>Verifying Payment...</h2>
    <p class="loading-text">Please wait while we confirm your payment.</p>
  </div>

  <!-- Success state -->
  <div id="success" style="display:none;">
    <div class="icon">🎉</div>
    <h2>Payment Successful!</h2>
    <p>Your plan has been activated. You can now generate AI try-on images.</p>
    <div class="detail" id="success-detail"></div>
    <a href="/dashboard.html" class="btn">Go to Dashboard →</a>
  </div>

  <!-- Failed state -->
  <div id="failed" style="display:none;">
    <div class="icon">❌</div>
    <h2>Payment Not Completed</h2>
    <div class="error-box" id="error-detail">The payment was not successful. No charges were made.</div>
    <a href="/dashboard.html" class="btn">Back to Dashboard</a>
  </div>
</div>

<script>
const token = localStorage.getItem('sbb_token');
if (!token) window.location.href = '/';

async function verifyPayment() {
  // Get order_id and plan from URL params (Cashfree passes order_id)
  const params = new URLSearchParams(window.location.search);
  const order_id = params.get('order_id');
  const plan_id = params.get('plan');

  // Also try from localStorage fallback
  let pendingOrder = null;
  try {
    pendingOrder = JSON.parse(localStorage.getItem('sbb_pending_order') || 'null');
  } catch {}

  const finalOrderId = order_id || pendingOrder?.order_id;
  const finalPlanId = plan_id || pendingOrder?.plan_id;

  if (!finalOrderId || !finalPlanId) {
    showFailed('Missing order information. Please contact support.');
    return;
  }

  try {
    const res = await fetch('/api/payment/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ order_id: finalOrderId, plan_id: finalPlanId }),
    });

    const data = await res.json();

    if (data.success) {
      // Clear pending order
      localStorage.removeItem('sbb_pending_order');
      showSuccess(data);
    } else {
      showFailed(data.message || 'Payment was not completed.');
    }

  } catch (err) {
    showFailed('Connection error. Please check your dashboard.');
  }
}

function showSuccess(data) {
  document.getElementById('verifying').style.display = 'none';
  document.getElementById('success').style.display = 'block';
  const planLabels = { starter: 'Starter', growth: 'Growth', pro: 'Pro' };
  document.getElementById('success-detail').innerHTML =
    `<strong>✅ ${planLabels[data.plan] || data.plan} Plan Activated</strong>
     ${data.images_limit} AI try-on images unlocked for 30 days.`;
}

function showFailed(msg) {
  document.getElementById('verifying').style.display = 'none';
  document.getElementById('failed').style.display = 'block';
  document.getElementById('error-detail').textContent = msg;
}

verifyPayment();
</script>
</body>
</html>
