<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #329580 0%, #245b62 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo h1 { font-size: 22px; font-weight: 700; color: #111; }
  .logo p { font-size: 14px; color: #666; margin-top: 4px; }
  .logo .icon { font-size: 40px; margin-bottom: 8px; }
  label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 6px; }
  input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #D1D5DB;
    border-radius: 8px;
    font-size: 15px;
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }
  input:focus { outline: none; border-color: #329580; box-shadow: 0 0 0 3px rgba(50,149,128,0.1); }
  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #329580 0%, #245b62 100%);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    background: #FEF2F2;
    color: #DC2626;
    border: 1px solid #FECACA;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
  }
  .hint { text-align: center; font-size: 13px; color: #6B7280; margin-top: 20px; }
</style>

<body>
<div class="card">
  <div class="logo">
    <div class="icon">🛍️</div>
    <h1>See Before Buy AI</h1>
    <p>Merchant Dashboard</p>
  </div>

  <div class="error" id="error-msg"></div>

  <form id="login-form">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="your@email.com" required>

    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password" required>

    <button class="btn" type="submit" id="login-btn">Sign In</button>
  </form>

  <p class="hint">Your login details were sent when you installed the app.</p>
</div>

<script>
const API = '';  // same origin

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try {
    const res = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      }),
    });

    const data = await res.json();

    if (!res.ok) {
      errEl.textContent = data.error || 'Login failed';
      errEl.style.display = 'block';
      return;
    }

    // Save token
    localStorage.setItem('sbb_token', data.token);
    localStorage.setItem('sbb_shop', JSON.stringify(data.shop));

    // If first login, go to change password page
    if (data.must_change_password) {
      window.location.href = '/change-password.html';
    } else {
      window.location.href = '/dashboard.html';
    }

  } catch (err) {
    errEl.textContent = 'Connection error. Please try again.';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});
</script>
</body>
